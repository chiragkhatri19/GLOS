name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: glos-monorepo/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: glos-monorepo
        run: pnpm install --frozen-lockfile

      - name: Build types
        working-directory: glos-monorepo
        run: pnpm build --filter=@glos/types

      - name: Build core
        working-directory: glos-monorepo
        run: pnpm build --filter=@glos/core

      - name: Build CLI
        working-directory: glos-monorepo
        run: pnpm build --filter=@chiragbuilds/glos

      - name: Build dashboard
        working-directory: glos-monorepo
        run: pnpm build --filter=dashboard
        env:
          GEMINI_API_KEY: placeholder
          LINGODOTDEV_API_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3002

      - name: Build demo
        working-directory: glos-monorepo
        run: pnpm build --filter=demo

      - name: Verify CLI binary exists
        working-directory: glos-monorepo
        run: |
          test -f packages/cli/dist/index.js && echo "✓ CLI binary exists" || exit 1
